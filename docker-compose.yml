services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./pdfs:/app/pdfs          # PDFs persist on your machine
      - minrag_data:/app/data     # SQLite DB survives container restarts
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/minrag.db
      PDF_DIR: /app/pdfs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  minrag_data:
